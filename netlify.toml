[build]
  command = "npm run build"
  publish = "dist"

# One-hop host and legacy URL consolidation. Canonical pages are prerendered in dist/.
[[redirects]]
  from = "https://www.gomytruck.com/*"
  to = "https://gomytruck.com/:splat"
  status = 301
  force = true

